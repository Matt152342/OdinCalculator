<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="./css/styles.css">
        <script src="./javascript/script.js" defer></script>
    </head>

    <body>
        <div class="main">
            <div class="calculator">
                <div class="display">
                    <div class="calculation"></div>
                    <div class="entered"></div>
                </div>

                <div class="buttons">
                    <div class="row">
                        <div class="button clear">Clear</div>
                        <div class="button delete">Delete</div>
                    </div>

                    <div class="row">
                        <div class="button seven">7</div>
                        <div class="button eight">8</div>
                        <div class="button nine">9</div>
                        <div class="button divide">/</div>
                    </div>

                    <div class="row">
                        <div class="button four">4</div>
                        <div class="button five">5</div>
                        <div class="button six">6</div>
                        <div class="button multiply">*</div>
                    </div>

                    <div class="row">
                        <div class="button one">1</div>
                        <div class="button two">2</div>
                        <div class="button three">3</div>
                        <div class="button minus">-</div>
                    </div>  

                    <div class="row">
                        <div class="button period">.</div>
                        <div class="button zero">0</div>
                        <div class="button equal">=</div>
                        <div class="button plus">+</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
